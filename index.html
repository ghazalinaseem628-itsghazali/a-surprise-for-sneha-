<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Smile For Sneha ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Background -->

<div id="stars"></div>
<div id="hearts"></div>
<div id="flash"></div>

<!-- Music -->

<audio id="bgMusic">
<source src="Man In love.mp3" type="audio/mpeg">
</audio>

<!-- Intro -->

<section id="intro" class="active">

<div class="glass">

<h3>🎧 Best experienced with Sound ON</h3>

<h1>
Some surprises aren't bought...
<br>
They're made with time ❤️
</h1>

<p>
Someone has something to tell you...
</p>

<button id="startBtn">
Tap To Open Your Surprise
</button>

</div>

</section>

<!-- Countdown -->

<section id="countdown">

<h1 id="countNumber">5</h1>

</section>

<!-- Reveal -->

<section id="reveal">

<div class="glass">

<h1>
Hey Sneha ❤️
</h1>

<p>
This is specially made for you...
</p>

</div>

</section>

<!-- Messages -->

<section id="messageBox">

<div class="glass">

<h2 id="messageTitle"></h2>

<p id="messageText"></p>

</div>

</section>

<!-- Gallery -->

<section id="gallery">

<div class="gallery-container">
<div class="photoGlow"></div>
<div class="lightSweep"></div>
<img
id="slideImage"
src="image/photo1.jpg"
alt="Sneha">


</div>

</section>

<!-- Ending -->

<section id="ending">

<div class="glass">

<h1>
Thank You For Smiling ❤️
</h1>

<h2>
— Ghazali
</h2>

<p>
<i>your bewakoof ❤️</i>
</p>

<button id="restartBtn">
Watch Again ❤️
</button>

</div>

</section>

<!-- Loader -->

<div id="loader">

<div class="loaderHeart">

❤️

</div>

<p>

Preparing your surprise...

</p>

</div>

<script src="script.js"></script>

</body>
</html>
